<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Like Hero To Zero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous" />
    <h:outputStylesheet library="css" name="style.css" />
</h:head>

<h:body class="bg-page">

    <!-- Header (hellrosa) -->
    <header class="bg-header text-dark py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h:outputLink value="index.xhtml" styleClass="text-dark fw-bold fs-4 text-decoration-none">
                Like Hero To Zero
            </h:outputLink>
            <h:link outcome="login.xhtml" value="Login" styleClass="btn btn-outline-dark" />
        </div>
    </header>

    <!-- Hauptcontainer mit dunkelblauem Rand -->
    <div class="main-container container p-4 mb-5 rounded shadow">

        <!-- Inhaltsbereich 1 (grün) -->
        <section class="content-section-1 p-3 rounded mb-4">
            <h2 class="h5">Hier findest du den aktuellen CO₂-Ausstoß deines Landes.</h2>
            <p>[Dropdown kommt hier hin]</p>
        </section>

        <!-- Inhaltsbereich 2 (gelb) -->
        <section class="content-section-2 p-3 rounded">
            <p>[Tabelle kommt hier hin]</p>
        </section>

    </div>

</h:body>
</html>
